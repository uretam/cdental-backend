server:
  port: 9082

spring:
  application:
    name: citas
  datasource:
    url: jdbc:mysql://localhost:3306/cdent_citas?serverTimezone=UTC&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml